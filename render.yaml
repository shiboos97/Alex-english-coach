services:
  - type: web
    name: alex-english-coach
    env: python
    region: singapore
    plan: free
    buildCommand: pip install fastapi uvicorn groq gtts python-dotenv
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
